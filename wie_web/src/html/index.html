<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="index.ts" defer="defer"></script>
    <style type="text/css">
      body, p {
        margin: 0px;
        touch-action: none;
        user-select: none;
      }

      #canvas {
        display: block;
        margin: 0 auto;
        aspect-ratio: 3 / 4;
        width: min(100vw, 480px);
      }

      .button-container {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .button-container > p {
        display: flex;
        width: 100%;
        justify-content: center;
      }

      .button-container > p > button {
        width: 20vw;
        height: 2vh;
        margin: 0.2em;
        font-size: 0.5em;
      }

      /* Tutorial Overlay */
      .tutorial-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }

      .tutorial-overlay.hidden {
        display: none;
      }

      .tutorial-modal {
        background: #fff;
        border-radius: 8px;
        padding: 24px;
        max-width: 400px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }

      .tutorial-modal h2 {
        margin: 0 0 16px 0;
        font-size: 1.5em;
        border-bottom: 2px solid #333;
        padding-bottom: 8px;
      }

      .tutorial-modal h3 {
        margin: 16px 0 8px 0;
        font-size: 1.1em;
        color: #333;
      }

      .tutorial-modal p {
        margin: 8px 0;
        line-height: 1.5;
      }

      .tutorial-modal .note {
        color: #666;
        font-size: 0.9em;
      }

      .tutorial-modal table {
        width: 100%;
        border-collapse: collapse;
        margin: 8px 0;
        font-size: 0.9em;
      }

      .tutorial-modal td {
        padding: 6px 8px;
        border-bottom: 1px solid #eee;
      }

      .tutorial-modal td:first-child {
        white-space: nowrap;
      }

      .tutorial-modal kbd {
        background: #f4f4f4;
        border: 1px solid #ccc;
        border-radius: 3px;
        padding: 2px 6px;
        font-family: monospace;
        font-size: 0.9em;
      }

      .tutorial-footer {
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid #eee;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .tutorial-footer label {
        font-size: 0.9em;
        color: #666;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .tutorial-footer button {
        background: #333;
        color: #fff;
        border: none;
        padding: 8px 20px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1em;
      }

      .tutorial-footer button:hover {
        background: #555;
      }
    </style>
  </head>
  <body>
    <div id="tutorial-overlay" class="tutorial-overlay">
      <div class="tutorial-modal">
        <h2>사용법</h2>
        
        <section>
          <h3>파일 업로드</h3>
          <p>휴대폰에서 추출한 <strong>ZIP 파일</strong>을 그대로 업로드하세요.</p>
          <p class="note">※ ZIP 파일 안에 <strong>JAR 파일</strong>이 포함되어 있어야 합니다.</p>
        </section>

        <section>
          <h3>키 바인딩</h3>
          <table>
            <tr><td><kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd></td><td>숫자 1, 2, 3</td></tr>
            <tr><td><kbd>Q</kbd> <kbd>W</kbd> <kbd>E</kbd></td><td>숫자 4, 5, 6</td></tr>
            <tr><td><kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd></td><td>숫자 7, 8, 9</td></tr>
            <tr><td><kbd>Z</kbd> <kbd>X</kbd> <kbd>C</kbd></td><td>*, 0, #</td></tr>
            <tr><td><kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd></td><td>방향키</td></tr>
            <tr><td><kbd>Space</kbd></td><td>OK</td></tr>
            <tr><td><kbd>Backspace</kbd></td><td>CLR</td></tr>
          </table>
        </section>

        <div class="tutorial-footer">
          <label>
            <input type="checkbox" id="dont-show-again" />
            다시 보지 않기
          </label>
          <button id="close-tutorial">닫기</button>
        </div>
      </div>
    </div>

    <p>
      <input type="file" id="file" />
      <button id="start">start</button>
    </p>
    <canvas id="canvas" width="240" height="320"></canvas>

    <div class="button-container">
      <p>
        <button data-key="UP">↑</button>
      </p>
      <p>
        <button data-key="LEFT">←</button>
        <button data-key="OK">OK</button>
        <button data-key="RIGHT">→</button>
      </p>
      <p>
        <button data-key="DOWN">↓</button>
      </p>
      <p>
        <button data-key="CLR">CLR</button>
      </p>
      <p>
        <button data-key="1">1</button>
        <button data-key="2">2</button>
        <button data-key="3">3</button>
      </p>
      <p>
        <button data-key="4">4</button>
        <button data-key="5">5</button>
        <button data-key="6">6</button>
      </p>
      <p>
        <button data-key="7">7</button>
        <button data-key="8">8</button>
        <button data-key="9">9</button>
      </p>
      <p>
        <button data-key="*">*</button>
        <button data-key="0">0</button>
        <button data-key="#">#</button>
      </p>
    </div>
  </body>
</html>
