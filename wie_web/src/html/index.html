<!doctype html>
<html>
  <head>
    <meta
      name="viewport"
      content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="stylesheet" href="@css/style.css" />
    <script src="@ts/index.ts" defer="defer"></script>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-G6TBDLLPWK"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-G6TBDLLPWK");
    </script>
  </head>
  <body>
    <div id="tutorial-overlay" class="tutorial-overlay">
      <div class="tutorial-modal">
        <h2>사용법</h2>

        <section>
          <h3>파일 업로드</h3>
          <p>
            휴대폰에서 추출한 파일을 <strong>ZIP 파일</strong>로 압축해서 그대로
            업로드하세요.
          </p>
          <p class="note">
            ※ ZIP 파일 안에 <strong>JAR 파일</strong>이 포함되어 있어야 합니다.
          </p>
        </section>

        <section>
          <h3>키 바인딩</h3>
          <table>
            <tr>
              <td><kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd></td>
              <td>숫자 1, 2, 3</td>
            </tr>
            <tr>
              <td><kbd>Q</kbd> <kbd>W</kbd> <kbd>E</kbd></td>
              <td>숫자 4, 5, 6</td>
            </tr>
            <tr>
              <td><kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd></td>
              <td>숫자 7, 8, 9</td>
            </tr>
            <tr>
              <td><kbd>Z</kbd> <kbd>X</kbd> <kbd>C</kbd></td>
              <td>*, 0, #</td>
            </tr>
            <tr>
              <td><kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd></td>
              <td>방향키</td>
            </tr>
            <tr>
              <td><kbd>Space</kbd></td>
              <td>OK</td>
            </tr>
            <tr>
              <td><kbd>Backspace</kbd></td>
              <td>CLR</td>
            </tr>
          </table>
        </section>

        <div class="tutorial-footer">
          <label>
            <input type="checkbox" id="dont-show-again" />
            다시 보지 않기
          </label>
          <button id="close-tutorial">닫기</button>
        </div>
      </div>
    </div>

    <div class="controls-bar">
      <div class="file-upload-collapse">
        <div class="file-upload">
          <input type="file" id="file" />
          <button id="start">실행</button>
          <button id="show-tutorial">사용법</button>
          <a href="https://github.com/dlunch/wie" target="_blank" rel="noopener noreferrer"><img src="https://cdn.simpleicons.org/github/white" alt="GitHub" width="16" height="16" /></a>
          <a href="https://wie-site.dlunch.net/" target="_blank" rel="noopener noreferrer">🌐</a>
        </div>
      </div>
      <button id="settings-toggle" class="settings-toggle">⚙️</button>
      <div id="settings-panel" class="settings-panel">
        <label>🎵 MIDI <input type="range" id="volume-midi" min="0" max="100" value="50" /></label>
        <label>🔊 효과음 <input type="range" id="volume-pcm" min="0" max="100" value="50" /></label>
      </div>
    </div>
    <div class="ad-banner" id="ad-banner"></div>
    <div class="canvas-wrapper">
      <canvas id="canvas" width="240" height="320"></canvas>
    </div>

    <div class="button-container">
      <p>
        <button data-key="UP">↑</button>
      </p>
      <p>
        <button data-key="LEFT">←</button>
        <button data-key="OK">OK</button>
        <button data-key="RIGHT">→</button>
      </p>
      <p>
        <button data-key="DOWN">↓</button>
      </p>
      <p>
        <button data-key="CLR">CLR</button>
      </p>
      <p>
        <button data-key="1">1</button>
        <button data-key="2">2</button>
        <button data-key="3">3</button>
      </p>
      <p>
        <button data-key="4">4</button>
        <button data-key="5">5</button>
        <button data-key="6">6</button>
      </p>
      <p>
        <button data-key="7">7</button>
        <button data-key="8">8</button>
        <button data-key="9">9</button>
      </p>
      <p>
        <button data-key="*">*</button>
        <button data-key="0">0</button>
        <button data-key="#">#</button>
      </p>
    </div>
  </body>
</html>
