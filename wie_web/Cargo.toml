[package]
name = "wie_web"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
crate-type = ["cdylib"]
path = "src/rust/lib.rs"

[dependencies]
anyhow = { workspace = true }

console_error_panic_hook = { version = "^0.1" }
time = { version = "^0.3", features = ["wasm-bindgen"] }
tracing-subscriber = { version = "^0.3", features = ["time"] }
tracing-web = { version = "^0.1" }
wasm-bindgen = { version = "^0.2" }
js-sys = { version = "^0.3" }
web-sys = { version = "^0.3", features = ["HtmlCanvasElement", "CanvasRenderingContext2d", "ImageData"] }

wie_backend = { workspace = true }
wie_ktf = { workspace = true }
wie_lgt = { workspace = true }
wie_skt = { workspace = true }
wie_j2me = { workspace = true }
