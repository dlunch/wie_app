on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

name: Web CI

jobs:
  web_ci:
    runs-on: arc-runner
    strategy:
      matrix:
        rust: [stable]

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: "recursive"

      - name: Install packages
        run: |
          sudo apt-get update;sudo apt-get install -y --no-install-recommends build-essential zstd

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.rust }}-build-wasm-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.rust }}-build-wasm-target-

      - name: Cache .npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          targets: wasm32-unknown-unknown

      - uses: actions/setup-node@v5
        with:
          node-version: latest

      - name: npm install
        working-directory: ./wie_web
        run: npm install

      - name: Build
        working-directory: ./wie_web
        run: npm run build:dev
