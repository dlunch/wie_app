name: Security audit
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Cache cargo registry
        uses: actions/cache/restore@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-audit-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache/restore@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-audit-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache/restore@v5
        with:
          path: target
          key: ${{ runner.os }}-stable-build-target-audit-${{ hashFiles('**/Cargo.lock') }}

      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
